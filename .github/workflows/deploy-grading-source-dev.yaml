name: Sync Fundamentals to S3 - DEV

on:
  push:
    paths:
      - 'fundamentals/**'
      - 'dataengineering/**'
      - '.github/workflows/deploy-grading-source-dev.yaml'

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
        aws-region: af-south-1

    - name: Sync Fundamentals to S3
      run: |
        aws s3 sync ./fundamentals s3://${{ secrets.S3_BUCKET_NAME_DEV }}/fundamentals --delete

    - name: Sync Data Engineering to S3
      run: |
        aws s3 sync ./dataengineering s3://${{ secrets.S3_BUCKET_NAME_DEV }}/dataengineering --delete
